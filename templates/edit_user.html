{% extends "base.html" %}
{% block title %}Modifier l'utilisateur{% endblock %}
{% block page_header %}Modifier l'utilisateur{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 600px;">
    <form method="POST">
        <label>Nom complet</label>
        <input type="text" name="nom" value="{{ utilisateur[1] }}" required>

        <label>Email</label>
        <input type="text" name="email" value="{{ utilisateur[2] }}" required>

        {% if utilisateur[3] == 'etudiant' %}
        <label>Classe</label>
        <input type="text" name="classe" value="{{ utilisateur[4] or '' }}">
        {% endif %}

        <button type="submit" class="btn-submit-small" style="margin-top: 18px;">Enregistrer</button>
    </form>
</div>
{% endblock %}
