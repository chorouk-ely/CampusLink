<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>CampusLink - Mot de passe oublie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="auth-card-page">
    <div class="auth-card">
        <div class="login-header">
            <span class="logo-icon">CL</span>
            <div><strong>CampusLink</strong><br>SUPMTI</div>
        </div>

        <h2>{{ t.forgot_password }}</h2>
        <p class="auth-subtitle">Entrez votre email, nous vous envoyons un code de verification.</p>

        {% if erreur %}
        <p class="login-error">{{ erreur }}</p>
        {% endif %}

        <form method="POST">
            <label>{{ t.email_label }}</label>
            <input type="text" name="email" placeholder="user@supmti.ma" required>
            <button type="submit" class="btn-submit" style="margin-top: 20px;">Envoyer le code</button>
        </form>

        <p class="auth-back-link"><a href="{{ url_for('login') }}">Retour a la connexion</a></p>
    </div>
</div>
</body>
</html>
