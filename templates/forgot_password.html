<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>CampusLink - Mot de passe oublié</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-form-side" style="max-width: 450px; margin: 80px auto;">
    <div class="login-header">
        <span class="logo-icon">🎓</span>
        <div><strong>CampusLink</strong><br>SUPMTI</div>
    </div>

    <h2>{{ t.forgot_password }}</h2>
    <p style="margin: 15px 0; color: #555;">Entrez votre email, nous vous envoyons un code de vérification.</p>

    {% if erreur %}
        <p style="color: red; margin-bottom: 15px;">{{ erreur }}</p>
    {% endif %}

    <form method="POST">
        <label>{{ t.email_label }}</label>
        <input type="text" name="email" placeholder="user@supmti.ma" required>
        <button type="submit" class="btn-submit" style="margin-top: 20px;">Envoyer le code</button>
    </form>

    <p style="margin-top: 20px;"><a href="{{ url_for('login') }}">← Retour à la connexion</a></p>
</div>
</body>
</html>
