<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>CampusLink - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-page">

    <div class="login-image">
        <img src="{{ url_for('static', filename='images/campus-login.jpg') }}" alt="Campus">
        <div class="image-overlay-top">
            
        </div>
       
    </div>

    <div class="login-form-side">
        <div class="login-header">
            <span class="logo-icon-text">CL</span>
            <div><strong>CampusLink</strong><br>SUPMTI</div>
        </div>

        {% if derniere_annonce %}
        <div class="important-banner">
            <strong>{{ t.important }}:</strong> {{ derniere_annonce }}
        </div>
        {% endif %}

        {% if erreur %}
        <div class="login-error">{{ erreur }}</div>
        {% endif %}

        <h2>{{ t.access_title }}</h2>

        <form method="POST" action="{{ url_for('login') }}">
            <label>{{ t.email_label }}</label>
            <input type="text" name="email" placeholder="user@supmti.ma" required>

            <label>{{ t.password_label }}</label>
            <input type="password" name="password" placeholder="........" required>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> {{ t.remember_me }}
                </label>
                <a href="{{ url_for('forgot_password') }}">{{ t.forgot_password }}</a>
            </div>

            <button type="submit" class="btn-submit">{{ t.submit }}</button>
        </form>

        <div class="login-footer">
            <span>{{ t.need_help }} {{ t.contact_support }}</span>
        </div>

        <div class="lang-switch-login">
            <a href="{{ url_for('set_language', lang='fr') }}" class="{{ 'lang-active' if lang == 'fr' else '' }}">Francais</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('set_language', lang='ar') }}" class="{{ 'lang-active' if lang == 'ar' else '' }}">العربية</a>
        </div>
    </div>

</div>
</body>
</html>
