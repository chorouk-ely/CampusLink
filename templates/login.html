<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">

<head>
    <meta charset="UTF-8">
    <title>CampusLink - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
    <div class="login-page">

        <div class="login-image">
            <img src="{{ url_for('static', filename='uploads/image1.jpg') }}" alt="Campus" class="carousel-slide active"
                data-index="0">
            <img src="{{ url_for('static', filename='uploads/remise.jpg') }}" alt="Campus" class="carousel-slide"
                data-index="1">

            <div class="image-pagination">
                <span id="carouselCounter">1 of 2</span>
                <button class="next-arrow" id="nextArrowBtn">&#8250;</button>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-header">
                <img src="{{ url_for('static', filename='uploads/supmti.png') }}" alt="CampusLink Logo" class="logo-icon">
                <div><strong>CampusLink</strong><br>SUPMTI</div>
            </div>

            <div class="important-banner">
                ⚠️ <strong>{{ t.important }}:</strong> {{ derniere_annonce }}
            </div>

            <h2>{{ t.access_title }}</h2>

            <form method="POST" action="{{ url_for('login') }}">
                <label>Adresse e-mail</label>
                <input type="text" name="email" placeholder="user@supmti.ma">

                <label>{{ t.password_label }}</label>
                <input type="password" name="password" placeholder="••••••••">

                <div class="form-options">
                    <label><input type="checkbox" name="remember"> {{ t.remember_me }}</label>
                    <a href="{{ url_for('forgot_password') }}">{{ t.forgot_password }}</a>
                </div>

                <button type="submit" class="btn-submit">{{ t.submit }}</button>
            </form>

            <div class="login-footer">
                <span>{{ t.need_help }} <a href="mailto:supmtioujda13@gmail.com">supmtioujda13@gmail.com</a></span>
            </div>
        </div>

    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
