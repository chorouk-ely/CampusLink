<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>CampusLink - Nouveau mot de passe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="auth-card-page">
    <div class="auth-card">
        <div class="login-header">
            <span class="logo-icon">CL</span>
            <div><strong>CampusLink</strong><br>SUPMTI</div>
        </div>

        <h2>Nouveau mot de passe</h2>

        <form method="POST">
            <label>{{ t.password_label }}</label>
            <input type="password" name="password" placeholder="********" required>
            <button type="submit" class="btn-submit" style="margin-top: 20px;">Confirmer</button>
        </form>
    </div>
</div>
</body>
</html>
